# Streamlit Cloud picks this up automatically. Keep colors mild — the demo
# screenshots will live in this look-and-feel.
[theme]
primaryColor = "#FF4B4B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
# headless is intentionally NOT set so local `streamlit run` auto-opens
# the browser. Streamlit Cloud sets it to true automatically; we don't
# need it in the file.
# Stay in sync with MAX_UPLOAD_MB in ui/pages/1_Upload.py.
maxUploadSize = 250  # MB

[browser]
gatherUsageStats = false
