# Streamlit Cloud picks this up automatically. Keep colors mild — the demo
# screenshots will live in this look-and-feel.
[theme]
primaryColor = "#FF4B4B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
headless = true
maxUploadSize = 100  # MB

[browser]
gatherUsageStats = false
