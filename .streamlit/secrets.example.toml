# Template for Streamlit Community Cloud secrets.
#
# In Streamlit Cloud:
#   App settings -> Secrets -> paste TOML content (without comments) -> Save.
#
# Streamlit re-reads secrets without redeploying. They're injected into
# os.environ AND into st.secrets at app startup.
#
# DO NOT commit the real secrets.toml to the repo (it's in .gitignore).

# URL of the deployed FastAPI backend (Render). No trailing slash.
DATAPOLISH_API_BASE = "https://data-polish-api.onrender.com"

# Stable cookie-signing key so user sessions survive server restarts.
# Generate with: python -c "import secrets; print(secrets.token_hex(32))"
AUTH_COOKIE_KEY = "REPLACE_WITH_64_HEX_CHARS"
